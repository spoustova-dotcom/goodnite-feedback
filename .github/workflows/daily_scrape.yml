name: Daily Review Scrape

on:
  schedule:
    - cron: '0 7 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Aktualizováno z v2 na v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Aktualizováno z v2 na v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'Scraper Bot'
          git config --global user.email 'bot@goodnite.cz'
          git add .
          git commit -m "Automatická aktualizace recenzí" || echo "Žádné změny k uložení"
          git push
