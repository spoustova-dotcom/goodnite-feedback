name: Daily Review Scrape

on:
  workflow_dispatch: # Umožní ti to spustit ručně tlačítkem
  schedule:
    - cron: '0 7 * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Důležité: Povoluje robotovi zapisovat do tvých souborů
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas playwright
          playwright install chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'Scraper Bot'
          git config --global user.email 'bot@goodnite.cz'
          git add .
          git commit -m "Automatická aktualizace recenzí" || exit 0
          git push
